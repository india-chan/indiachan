<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IndiaChan</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#05070a; color:#94a3b8; font-family:sans-serif; }
.glass { background:rgba(13,17,28,.7); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,.08); }
.post-img { max-width:100%; border-radius:12px; margin-top:10px; cursor:pointer; }
</style>
</head>

<body>

<div class="max-w-2xl mx-auto p-4">
<header class="flex justify-between items-center py-6">
<h1 class="text-3xl text-white font-black">India<span class="text-orange-400">Chan</span></h1>
<button onclick="openModal()" class="bg-white text-black px-4 py-2 rounded">New Thread</button>
</header>

<div id="view"></div>

<footer class="mt-20 text-center border-t border-white/10 pt-6">
<p class="text-xs text-slate-500 mb-2">
Not Associated with Other/Older IndianChan or BharatChan
</p>

<div class="mt-4">
<span class="text-[10px] text-slate-500 uppercase block">Contact</span>
<a href="mailto:JefferyEpstienMossad@proton.me" class="text-white text-sm">
JefferyEpstienMossad@proton.me
</a>
</div>
</footer>
</div>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">
<div class="glass p-6 rounded w-full max-w-md">
<input id="title" placeholder="Title" class="w-full p-2 mb-2 bg-black text-white">
<textarea id="content" placeholder="Content" class="w-full p-2 bg-black text-white"></textarea>
<button onclick="submitPost()" class="bg-orange-500 w-full mt-4 p-2">Post</button>
</div>
</div>

<script>
// 🔐 SECURITY: REMOVE HARDCODED KEYS
const WORKER_URL = "YOUR_BACKEND_URL"; // move to server
// NEVER expose keys like before

// 🛡️ SANITIZE FUNCTION
function sanitize(str){
    const div = document.createElement('div');
    div.innerText = str;
    return div.innerHTML;
}

// ⚡ SAFE API CALL
async function api(path="", method="GET", body=null){
    try{
        const res = await fetch(WORKER_URL + path,{
            method,
            headers:{ "Content-Type":"application/json" },
            body: body ? JSON.stringify(body):null
        });
        return await res.json();
    }catch(e){
        console.error("API error", e);
        return null;
    }
}

// ⚡ LAZY IMAGE RENDER
function renderContent(text){
    return sanitize(text).replace(
        /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/gi,
        `<img loading="lazy" src="$1" class="post-img">`
    );
}

// ⚡ RENDER BOARD
function render(threads){
    const el = document.getElementById("view");

    el.innerHTML = threads.map(t=>`
        <div class="glass p-4 mb-4 rounded">
            <h2 class="text-white font-bold">${sanitize(t.title)}</h2>
            <p>${renderContent(t.content)}</p>
        </div>
    `).join("");
}

// ⚡ ROUTER
async function load(){
    const data = await api();
    if(data) render(data);
}

// ⚡ MODAL
function openModal(){ document.getElementById("modal").classList.remove("hidden"); }

// ⚡ SUBMIT
async function submitPost(){
    const title = document.getElementById("title").value;
    const content = document.getElementById("content").value;

    if(content.length < 2) return alert("Too short");

    await api("", "POST", { title, content });

    location.reload();
}

// INIT
load();

</script>
</body>
</html>
