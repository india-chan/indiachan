<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiaChan | Anonymous Imageboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #05070a; color: #94a3b8; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(13, 17, 28, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .accent-text { color: #ff9933; }
        .accent-bg { background: #ff9933; }
        .post-img { max-width: 100%; border-radius: 12px; margin-top: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .thumb-box { width: 80px; height: 80px; min-width: 80px; border-radius: 12px; overflow: hidden; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); }
        .thumb-img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="pb-20">
    <div id="ageWall" class="fixed inset-0 bg-[#05070a] z-[300] flex items-center justify-center p-6 text-center">
        <div class="max-w-sm">
            <h1 class="text-5xl font-black text-white mb-6 uppercase italic">India<span class="accent-text">Chan</span></h1>
            <button onclick="acceptAge()" class="accent-bg w-full py-4 rounded-xl text-white font-bold tracking-widest uppercase">Enter Board</button>
        </div>
    </div>

    <div class="max-w-2xl mx-auto px-4">
        <header class="py-10 flex justify-between items-center">
            <h1 onclick="window.location.hash = ''" class="text-4xl font-black text-white cursor-pointer uppercase italic">India<span class="accent-text">Chan</span></h1>
            <button onclick="openModal()" class="bg-white text-black px-6 py-2 rounded-full font-bold text-xs uppercase">New Post</button>
        </header>

        <div id="view-container" class="space-y-4">
            <div class="text-center py-20 opacity-50">Loading transmissions...</div>
        </div>
    </div>

    <div id="postModal" class="hidden fixed inset-0 bg-black/90 z-[250] flex items-center justify-center p-4">
        <div class="glass w-full max-w-lg p-6 rounded-[2rem]">
            <input id="inpTitle" type="text" placeholder="Subject" class="w-full p-4 rounded-xl mb-3 bg-slate-900 border border-white/10 text-white">
            <textarea id="inpContent" placeholder="Content..." class="w-full p-4 rounded-xl mb-4 h-40 bg-slate-900 border border-white/10 text-white"></textarea>
            
            <div class="flex gap-4 mb-6">
                <div class="flex-1 bg-slate-900 p-3 rounded-xl border border-white/10 flex items-center justify-between">
                    <span id="captchaTxt" class="text-xs font-bold text-slate-500"></span>
                    <input id="inpCaptcha" type="number" class="w-12 bg-transparent border-b border-orange-500 text-center text-white outline-none">
                </div>
                <button onclick="document.getElementById('imgInput').click()" id="uploadBtn" class="flex-1 bg-white/5 border border-white/10 rounded-xl text-[10px] font-bold uppercase text-slate-400">Add Image</button>
                <input type="file" id="imgInput" class="hidden" accept="image/*" onchange="uploadToImgBB(this)">
            </div>
            
            <button onclick="submitPost()" class="accent-bg w-full py-4 rounded-xl text-white font-bold uppercase tracking-widest">Transmit</button>
            <button onclick="closeModal()" class="w-full mt-4 text-slate-600 text-[10px] uppercase font-bold">Cancel</button>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const WORKER_URL = 'https://anon-board.indiachan.workers.dev'; // No trailing slash here
        const AUTH_KEY = 'my-secret-key-123';
        const IMGBB_KEY = '6e999c06f4db58014ea5eaa09366eece';
        let captchaAns = 0;

        function acceptAge() { localStorage.setItem('v3_age', 't'); document.getElementById('ageWall').remove(); }
        if(localStorage.getItem('v3_age')) document.getElementById('ageWall').remove();

        function genCaptcha() {
            const a = Math.floor(Math.random() * 9) + 1; const b = Math.floor(Math.random() * 9) + 1;
            captchaAns = a + b; document.getElementById('captchaTxt').innerText = `${a} + ${b} =`;
        }

        async function api(path = "", method = "GET", body = null) {
            const url = `${WORKER_URL}${path}`;
            try {
                const res = await fetch(url, {
                    method,
                    headers: { 'X-Anon-Key': AUTH_KEY, 'Content-Type': 'application/json' },
                    body: body ? JSON.stringify(body) : null
                });
                return res.ok ? await res.json() : null;
            } catch (e) {
                console.error("API Error:", e);
                return null;
            }
        }

        async function uploadToImgBB(input) {
            const btn = document.getElementById('uploadBtn'); btn.innerText = "UPLOADING...";
            const fd = new FormData(); fd.append("image", input.files[0]);
            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: fd });
                const data = await res.json();
                if(data.success) { 
                    document.getElementById('inpContent').value += `\n${data.data.url}`; 
                    btn.innerText = "IMAGE READY"; 
                }
            } catch (e) { btn.innerText = "UPLOAD FAILED"; }
        }

        function renderBoard(threads) {
            const container = document.getElementById('view-container');
            if (!threads || threads.length === 0) {
                container.innerHTML = '<div class="text-center py-20 opacity-30 uppercase font-black tracking-tighter text-4xl">No Transmissions</div>';
                return;
            }
            container.innerHTML = threads.map((t, i) => {
                const firstPost = t.replies[0].content;
                const imgMatch = firstPost.match(/(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/i);
                const thumb = imgMatch ? `<div class="thumb-box"><img src="${imgMatch[0]}" class="thumb-img"></div>` : `<div class="thumb-box flex items-center justify-center text-slate-700 text-[10px] font-bold">TEXT</div>`;
                
                return `
                    <div onclick="window.location.hash = '#thread/${t.id}'" class="glass p-4 rounded-3xl flex gap-4 items-center cursor-pointer hover:border-orange-500/30 transition-all">
                        ${thumb}
                        <div class="flex-1 min-w-0">
                            <h2 class="text-sm font-black text-white uppercase truncate">${t.title}</h2>
                            <p class="text-slate-500 text-xs line-clamp-1">${firstPost}</p>
                            <div class="text-[9px] font-bold text-orange-500/50 mt-1 uppercase">${t.replies.length} Replies</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderThread(t) {
            const container = document.getElementById('view-container');
            container.innerHTML = `
                <button onclick="window.location.hash = ''" class="mb-6 text-[10px] font-bold text-slate-500 uppercase tracking-widest"><i class="fa fa-arrow-left"></i> Return to Board</button>
                <div class="space-y-4">
                    ${t.replies.map(r => `
                        <div class="glass p-6 rounded-[2rem] border-l-4 border-orange-500/20">
                            <div class="flex justify-between items-center mb-4">
                                <span class="text-[9px] font-black text-slate-600 uppercase">Anon ## ${r.hash}</span>
                            </div>
                            <div class="text-slate-300 text-sm leading-relaxed whitespace-pre-wrap">${r.content.replace(/(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/gi, '<img src="$1" class="post-img">')}</div>
                        </div>
                    `).join('')}
                </div>
                <button onclick="openModal()" class="accent-bg w-full py-5 rounded-2xl mt-8 text-white font-black uppercase tracking-widest shadow-lg">Reply to Thread</button>
            `;
            window.scrollTo(0, 0);
        }

        function openModal() { genCaptcha(); document.getElementById('postModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('postModal').classList.add('hidden'); }

        async function submitPost() {
            const captchaInput = document.getElementById('inpCaptcha').value;
            if (parseInt(captchaInput) !== captchaAns) return alert("Invalid Captcha");

            const hash = window.location.hash;
            const isReply = hash.startsWith('#thread/');
            const data = {
                type: isReply ? 'reply' : 'thread',
                threadId: isReply ? hash.split('/')[1] : null,
                title: document.getElementById('inpTitle').value || "Anonymous Transmission",
                content: document.getElementById('inpContent').value
            };

            const res = await api("/", "POST", data);
            if(res) {
                closeModal();
                document.getElementById('inpContent').value = '';
                document.getElementById('inpTitle').value = '';
                router();
            }
        }

        async function router() {
            const hash = window.location.hash;
            if (hash.startsWith('#thread/')) {
                const t = await api(`?id=${hash.split('/')[1]}`);
                if(t) renderThread(t);
            } else {
                const threads = await api();
                renderBoard(threads);
            }
        }

        window.addEventListener('hashchange', router);
        router();
    </script>
</body>
</html>
