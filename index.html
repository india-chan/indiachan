<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiaChan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #05070a; color: #94a3b8; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(13, 17, 28, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .post-img { max-width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid #1e293b; cursor: pointer; }
        .accent-text { color: #ff9933; }
        .accent-bg { background: #ff9933; }
        .dot-menu { position: absolute; top: 1.5rem; right: 1.5rem; }
        .sticky-tag { background: #ff9933; color: white; padding: 2px 8px; border-radius: 4px; font-size: 8px; font-weight: 900; margin-right: 8px; }
    </style>
</head>
<body class="pb-24">

    <div id="ageWall" class="fixed inset-0 bg-[#05070a] z-[200] flex items-center justify-center p-6 text-center">
        <div class="max-w-sm w-full">
            <h1 class="text-5xl font-black text-white mb-4 italic tracking-tighter uppercase">India<span class="accent-text">Chan</span></h1>
            <p class="text-slate-500 mb-8 text-xs leading-loose tracking-widest uppercase">Welcome to the void. 18+ Only.</p>
            <button onclick="acceptAge()" class="accent-bg w-full py-4 rounded-xl text-white font-black tracking-widest hover:scale-[0.98] transition">I AM 18+</button>
        </div>
    </div>

    <div class="max-w-2xl mx-auto px-4">
        <header class="py-12 flex justify-between items-center">
            <h1 onclick="window.location.hash = ''" class="text-3xl font-black text-white cursor-pointer italic uppercase tracking-tighter">India<span class="accent-text">Chan</span></h1>
            <button onclick="openModal()" class="bg-white text-black px-5 py-2 rounded-full font-black text-[10px] tracking-widest uppercase shadow-lg shadow-white/5">Post</button>
        </header>

        <div id="view-container" class="space-y-4"></div>
    </div>

    <div id="postModal" class="hidden fixed inset-0 bg-black/95 z-[150] flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="glass w-full max-w-lg p-6 sm:p-10 rounded-t-[2rem] sm:rounded-[2.5rem] border-t sm:border border-slate-800">
            <div class="flex justify-between items-center mb-6">
                <span class="text-[10px] font-black tracking-widest uppercase accent-text">New Transmission</span>
                <button onclick="closeModal()" class="text-slate-600"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <input id="inpTitle" type="text" placeholder="Subject" class="w-full bg-slate-900/50 p-4 rounded-xl mb-3 border border-slate-800 outline-none text-white text-sm">
            <textarea id="inpContent" placeholder="Content... Supports ImgBB links." class="w-full bg-slate-900/50 p-4 rounded-xl mb-4 border border-slate-800 h-40 outline-none text-white text-sm"></textarea>
            
            <div class="flex items-center gap-3 mb-6">
                <input type="file" id="imgInput" class="hidden" accept="image/*" onchange="uploadToImgBB(this)">
                <button onclick="document.getElementById('imgInput').click()" id="uploadBtn" class="flex-1 bg-slate-800 py-3 rounded-xl text-[10px] font-black tracking-widest uppercase text-slate-400 hover:text-white transition">
                    <i class="fa-solid fa-image mr-2"></i> Upload Image
                </button>
            </div>

            <button onclick="submitPost()" class="accent-bg w-full py-4 rounded-xl text-white font-black tracking-widest uppercase shadow-xl shadow-orange-900/20">Transmit</button>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://anon-board.indiachan.workers.dev/'; 
        const AUTH_KEY = 'my-secret-key-123';
        const IMGBB_KEY = '6e999c06f4db58014ea5eaa09366eece';

        function acceptAge() { localStorage.setItem('india_chan_age', 't'); document.getElementById('ageWall').remove(); }
        if(localStorage.getItem('india_chan_age')) document.getElementById('ageWall').remove();

        async function api(path = "", method = "GET", body = null, headers = {}) {
            const res = await fetch(`${WORKER_URL}${path}`, {
                method, headers: { 'X-Anon-Key': AUTH_KEY, 'Content-Type': 'application/json', ...headers },
                body: body ? JSON.stringify(body) : null
            });
            return res.ok ? await res.json() : null;
        }

        async function uploadToImgBB(input) {
            const btn = document.getElementById('uploadBtn');
            btn.innerText = "Uploading...";
            const formData = new FormData();
            formData.append("image", input.files[0]);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: formData });
            const data = await res.json();
            if(data.success) {
                document.getElementById('inpContent').value += `\n${data.data.url}`;
                btn.innerText = "Upload Success";
            }
        }

        async function handleAction(type, tId, rId = null) {
            const pass = prompt("Admin Password:");
            if(!pass) return;
            const method = type === 'sticky' ? 'PATCH' : 'DELETE';
            const query = rId ? `?id=${tId}&replyId=${rId}` : `?id=${tId}`;
            const res = await api(query, method, null, { 'X-Admin-Pass': pass });
            if(res) router();
        }

        async function report(tId) {
            if(confirm("Report this thread for violation?")) {
                await api(`/report?id=${tId}`, "POST");
                alert("Reported. 10 unique reports will auto-hide this.");
                router();
            }
        }

        function format(t) {
            return t.replace(/(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/gi, '<img src="$1" class="post-img" loading="lazy">');
        }

        async function router() {
            const hash = window.location.hash;
            if (hash.startsWith('#thread/')) {
                const t = await api(`?id=${hash.split('/')[1]}`);
                if(t) renderThread(t);
            } else {
                const threads = await api();
                renderBoard(threads || []);
            }
        }

        function renderBoard(threads) {
            document.getElementById('view-container').innerHTML = threads.map(t => `
                <div class="relative glass p-6 rounded-[1.5rem] group active:scale-[0.98] transition">
                    <div onclick="window.location.hash = '#thread/${t.id}'">
                        <div class="flex items-center mb-2">
                            ${t.sticky ? '<span class="sticky-tag">STICKY</span>' : ''}
                            <h2 class="text-lg font-bold text-white uppercase tracking-tight truncate">${t.title}</h2>
                        </div>
                        <p class="text-slate-500 text-xs line-clamp-2 leading-relaxed">${t.replies[0].content}</p>
                        <div class="mt-4 flex gap-4 text-[8px] font-black uppercase tracking-widest opacity-40">
                            <span>${t.replies.length} Replies</span>
                            <span>ID: ${t.id}</span>
                        </div>
                    </div>
                    <div class="dot-menu">
                        <button onclick="toggleMenu('${t.id}')" class="text-slate-700 p-2"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                        <div id="m-${t.id}" class="hidden absolute right-0 mt-2 w-32 glass border border-white/5 rounded-xl z-50 overflow-hidden text-[9px] font-black uppercase tracking-widest">
                            <button onclick="report('${t.id}')" class="w-full p-4 text-left hover:bg-white/5 text-slate-400">Report</button>
                            <button onclick="handleAction('sticky', '${t.id}')" class="w-full p-4 text-left hover:bg-white/5 text-orange-500">Sticky</button>
                            <button onclick="handleAction('delete', '${t.id}')" class="w-full p-4 text-left hover:bg-white/5 text-red-900">Nuke</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderThread(t) {
            document.getElementById('view-container').innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <button onclick="window.location.hash = ''" class="text-[10px] font-black uppercase tracking-widest text-slate-600"><i class="fa-solid fa-arrow-left mr-2"></i> Back</button>
                    <button onclick="report('${t.id}')" class="text-[10px] font-black uppercase tracking-widest text-red-900/50">Report Thread</button>
                </div>
                <div class="space-y-4">
                    ${t.replies.map((r, i) => `
                        <div class="relative glass p-5 rounded-2xl ${i > 0 ? 'ml-4 sm:ml-8' : 'border-orange-500/20'}">
                            <div class="flex justify-between items-center mb-3">
                                <div class="flex items-center gap-2">
                                    <div class="w-2 h-2 rounded-full" style="background:#${r.hash}"></div>
                                    <span class="text-[9px] font-black uppercase text-slate-500">Anon</span>
                                </div>
                                <button onclick="toggleMenu('${r.id}')" class="text-slate-800 text-xs"><i class="fa-solid fa-ellipsis"></i></button>
                                <div id="m-${r.id}" class="hidden absolute right-4 top-10 w-24 glass rounded-lg z-50 overflow-hidden text-[8px] font-black uppercase">
                                    <button onclick="handleAction('delete', '${t.id}', '${r.id}')" class="w-full p-3 text-left text-red-900">Delete</button>
                                </div>
                            </div>
                            <div class="text-slate-300 text-sm leading-relaxed">${format(r.content)}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="fixed bottom-6 left-4 right-4 max-w-2xl mx-auto">
                    <button onclick="openModal()" class="accent-bg w-full py-4 rounded-xl text-white font-black tracking-widest uppercase shadow-2xl">Post Reply</button>
                </div>
            `;
        }

        function toggleMenu(id) { 
            const el = document.getElementById(`m-${id}`);
            document.querySelectorAll('[id^="m-"]').forEach(m => m !== el && m.classList.add('hidden'));
            el.classList.toggle('hidden'); 
        }

        function openModal() { document.getElementById('postModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('postModal').classList.add('hidden'); }

        async function submitPost() {
            const hash = window.location.hash;
            const res = await api("", "POST", {
                type: hash ? 'reply' : 'thread',
                threadId: hash ? hash.split('/')[1] : null,
                title: document.getElementById('inpTitle').value || "Untitled",
                content: document.getElementById('inpContent').value
            });
            if(res) { closeModal(); document.getElementById('inpContent').value = ''; router(); }
        }

        window.addEventListener('hashchange', router);
        router();
    </script>
</body>
</html>
