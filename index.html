<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiaChan | Indian Anonymous Imageboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #05070a; color: #94a3b8; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(13, 17, 28, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); position: relative; }
        
        /* Imageboard Styles */
        .post-img { 
            max-width: 200px; 
            max-height: 200px; 
            cursor: zoom-in; 
            border-radius: 8px; 
            margin-bottom: 10px; 
            border: 1px solid rgba(255,255,255,0.1); 
            transition: all 0.2s ease-in-out;
            display: block;
        }
        .post-img.expanded { 
            max-width: 100%; 
            max-height: none; 
            cursor: zoom-out; 
            border-radius: 12px; 
        }

        .thumb-box { width: 85px; height: 85px; min-width: 85px; border-radius: 16px; overflow: hidden; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); }
        .thumb-img { width: 100%; height: 100%; object-fit: cover; }
        .tag { padding: 2px 6px; border-radius: 4px; font-size: 8px; font-weight: 900; margin-right: 8px; text-transform: uppercase; color: white; }
        .sticky-tag { background: #ff9933; }
        .lock-tag { background: #64748b; }
        .flag-icon { width: 18px; height: 12px; border-radius: 2px; object-fit: cover; display: inline-block; vertical-align: middle; margin-right: 5px; }
        .clickable-id { cursor: pointer; }
        .clickable-id:hover { color: #ff9933; text-decoration: underline; }
        .admin-menu { z-index: 100; box-shadow: 0 10px 40px rgba(0,0,0,0.9); }
        
        footer a { color: #64748b; transition: color 0.2s; }
        footer a:hover { color: #ff9933; }
    </style>
</head>
<body class="pb-20">
    <div id="ageWall" class="fixed inset-0 bg-[#05070a] z-[300] flex items-center justify-center p-6 text-center">
        <div class="max-w-sm w-full">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg5CV9n0R91ThtxHPeBtG_FSKCyUi3Z3KbRnp0Yq0PM5BIA1WVcQO9jieJWdne6hBW_OxAbXX8syFXdw13OG7X447OWbyrvFlh8zXgLDGlzs5iJjisKSfIPg4VDt85UmmBHRUDjr8BdTAmt9K82RQFY-0ovvMNhyL2EeWFa0yfRmbIgatZDsUUHV1_hFm9j/s0/40701.png" class="mx-auto mb-6 max-h-20">
            <button onclick="acceptAge()" class="bg-orange-500 w-full py-5 rounded-2xl text-white font-black">I AM 18+ / ENTER</button>
        </div>
    </div>

    <div class="max-w-2xl mx-auto px-4">
        <header class="py-12 flex flex-col sm:flex-row justify-between items-center gap-6">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg5CV9n0R91ThtxHPeBtG_FSKCyUi3Z3KbRnp0Yq0PM5BIA1WVcQO9jieJWdne6hBW_OxAbXX8syFXdw13OG7X447OWbyrvFlh8zXgLDGlzs5iJjisKSfIPg4VDt85UmmBHRUDjr8BdTAmt9K82RQFY-0ovvMNhyL2EeWFa0yfRmbIgatZDsUUHV1_hFm9j/s0/40701.png" onclick="window.location.hash = ''" class="h-14 cursor-pointer">
            <button onclick="openModal()" class="bg-white text-black px-8 py-3 rounded-full font-black text-[10px] uppercase">New Thread</button>
        </header>

        <div id="view-container" class="space-y-6"></div>

        <footer class="mt-20 py-10 border-t border-white/5 text-center space-y-4">
            <div class="flex justify-center gap-6 text-[10px] font-black uppercase tracking-widest">
                <a href="#">Home</a>
                <a href="#archive">Archive</a>
                <a href="https://github.com/India-Chan" target="_blank">GitHub</a>
                <a href="#">Rules</a>
            </div>
            <p class="text-[9px] text-slate-600 font-bold uppercase tracking-tighter">
                &copy; 2026 IndiaChan — All Rights Reserved. <br>
                The content on this site is user-generated.
            </p>
        </footer>
    </div>

    <div id="postModal" class="hidden fixed inset-0 bg-black/90 z-[250] flex items-center justify-center p-4">
        <div class="glass w-full max-w-lg p-8 rounded-[3rem] overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <span id="modalTitle" class="text-orange-500 font-black uppercase tracking-widest text-[11px]">Transmission</span>
                <button onclick="closeModal()" class="text-slate-400"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <input id="inpTitle" type="text" placeholder="Subject" class="w-full p-4 rounded-2xl mb-4 bg-slate-900 border border-white/10 text-white font-bold">
            <textarea id="inpContent" placeholder="Content..." class="w-full p-4 rounded-2xl mb-4 h-40 bg-slate-900 border border-white/10 text-white outline-none"></textarea>
            <input id="inpImageLink" type="url" placeholder="ImgBB Link" class="w-full p-4 rounded-xl text-xs mb-4 bg-slate-900 border border-white/10 text-white">
            <div class="bg-white/5 p-4 rounded-2xl flex items-center justify-between mb-6">
                <span id="captchaTxt" class="text-orange-500 font-black tracking-widest"></span>
                <input id="inpCaptcha" type="text" class="w-24 bg-transparent border-b-2 border-orange-500 text-center text-white outline-none">
            </div>
            <button id="submitBtn" onclick="submitPost()" class="bg-orange-500 w-full py-5 rounded-2xl text-white font-black uppercase">Send Message</button>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://indiachan.indiachan.workers.dev/'; 
        let captchaAns = "";

        function acceptAge() { localStorage.setItem('v3_age', 't'); document.getElementById('ageWall').remove(); }
        if(localStorage.getItem('v3_age')) document.getElementById('ageWall').remove();

        function genCaptcha() {
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            captchaAns = "";
            for(let i=0; i<5; i++) captchaAns += chars.charAt(Math.floor(Math.random() * chars.length));
            document.getElementById('captchaTxt').innerText = captchaAns;
        }

        // IMAGE EXPANSION LOGIC
        function toggleExpand(el) {
            el.classList.toggle('expanded');
        }

        async function api(path="", method="GET", body=null, headers={}) {
            const url = `${WORKER_URL}${path}${path.includes('?') ? '&' : '?'}t=${Date.now()}`;
            const options = { method, headers };
            if (body) { options.headers['Content-Type'] = 'application/json'; options.body = JSON.stringify(body); }
            const res = await fetch(url, options);
            return res.ok ? await res.json() : null;
        }

        function quoteReply(id) {
            openModal();
            const textarea = document.getElementById('inpContent');
            textarea.value = (textarea.value ? textarea.value + '\n' : '') + `>>${id}\n`;
            textarea.focus();
        }

        function renderBoard(threads) {
            document.getElementById('view-container').innerHTML = threads.map((t, i) => `
                <div onclick="window.location.hash = '#thread/${t.id}'" class="relative glass p-5 rounded-[2.5rem] flex gap-5 items-center cursor-pointer">
                    <div class="thread-number">#${i + 1}</div>
                    ${t.replies[0].image ? `<div class="thumb-box"><img src="${t.replies[0].image}" class="thumb-img"></div>` : `<div class="thumb-box flex items-center justify-center text-[10px] font-black">TEXT</div>`}
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center mb-1">
                            ${t.sticky ? '<span class="tag sticky-tag">STICKY</span>' : ''}
                            ${t.locked ? '<span class="tag lock-tag">LOCKED</span>' : ''}
                            <h2 class="text-sm font-black text-white uppercase truncate">${t.title}</h2>
                        </div>
                        <p class="text-slate-500 text-[11px] line-clamp-1">${t.replies[0].content}</p>
                    </div>
                    <button onclick="event.stopPropagation(); toggleMenu('${t.id}')" class="p-2 text-slate-700"><i class="fa-solid fa-ellipsis-v"></i></button>
                    <div id="m-${t.id}" class="admin-menu hidden absolute right-6 top-16 w-44 glass rounded-2xl text-[9px] font-black uppercase overflow-hidden border border-white/10">
                        <button onclick="handleAction('sticky', '${t.id}')" class="w-full p-4 text-left border-b border-white/5">Sticky</button>
                        <button onclick="handleAction('lock', '${t.id}')" class="w-full p-4 text-left border-b border-white/5">Lock</button>
                        <button onclick="handleAction('nuke', null, null, '${t.replies[0].ip}')" class="w-full p-4 text-left text-red-500 border-b border-white/5">Nuke IP</button>
                        <button onclick="handleAction('delete', '${t.id}')" class="w-full p-4 text-left text-red-500">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function renderThread(t) {
            document.getElementById('view-container').innerHTML = `
                <button onclick="window.location.hash = ''" class="mb-4 text-[10px] font-black uppercase text-slate-500">← Back</button>
                <h1 class="text-2xl font-black text-white mb-8 uppercase tracking-tighter">${t.title}</h1>
                <div class="space-y-6">
                    ${t.replies.map(r => `
                        <div class="relative glass p-7 rounded-[2.5rem]">
                            <div class="flex justify-between items-center mb-4">
                                <div class="flex items-center">
                                    <img src="https://flagcdn.com/w20/${(r.country || 'un').toLowerCase()}.png" class="flag-icon">
                                    <span onclick="quoteReply('${r.userId}')" class="text-[10px] font-black text-slate-500 uppercase clickable-id">ID: ${r.userId}</span>
                                </div>
                                <button onclick="toggleMenu('${r.id}')" class="text-slate-800"><i class="fa-solid fa-ellipsis"></i></button>
                                <div id="m-${r.id}" class="admin-menu hidden absolute right-8 top-12 w-44 glass rounded-2xl text-[9px] font-black uppercase overflow-hidden border border-white/10">
                                    <button onclick="handleAction('edit', '${t.id}', '${r.id}')" class="w-full p-4 text-left border-b border-white/5">Edit</button>
                                    <button onclick="handleAction('ban', null, null, '${r.ip}')" class="w-full p-4 text-left border-b border-white/5">Ban User</button>
                                    <button onclick="handleAction('nuke', null, null, '${r.ip}')" class="w-full p-4 text-left text-red-500 border-b border-white/5">Nuke IP</button>
                                    <button onclick="handleAction('delete', '${t.id}', '${r.id}')" class="w-full p-4 text-left text-red-500">Delete Post</button>
                                </div>
                            </div>
                            ${r.image ? `<img src="${r.image}" class="post-img" onclick="toggleExpand(this)">` : ''}
                            <div class="text-slate-200 text-[14px] leading-relaxed whitespace-pre-wrap">${r.content.replace(/>>([a-fA-F0-9]{8})/g, '<span class="text-orange-500 font-bold">>>$1</span>')}</div>
                        </div>`).join('')}
                </div>
                ${!t.locked ? `<div class="mt-10"><button onclick="openModal()" class="bg-orange-500 w-full py-5 rounded-3xl text-white font-black uppercase">Post Reply</button></div>` : ''}
            `;
        }

        async function handleAction(type, tId, rId = null, ip = null) {
            const pass = prompt("Admin Password:"); if(!pass) return;
            const headers = { 'X-Admin-Pass': pass };
            let res;
            if (type === 'ban') res = await api("", "POST", { action: 'ban', targetIp: ip }, headers);
            else if (type === 'nuke') res = await api(`?nukeIp=${ip}`, "DELETE", null, headers);
            else if (type === 'sticky' || type === 'lock') res = await api(`?id=${tId}`, "PATCH", { action: type }, headers);
            else if (type === 'edit') res = await api(`?id=${tId}${rId ? '&replyId='+rId : ''}`, "PATCH", { action: 'edit', newContent: prompt("New text:") }, headers);
            else res = await api(`?id=${tId}${rId ? '&replyId='+rId : ''}`, "DELETE", null, headers);
            if(res) router();
        }

        function openModal() { genCaptcha(); document.getElementById('postModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('postModal').classList.add('hidden'); }
        function toggleMenu(id) { const el = document.getElementById(`m-${id}`); document.querySelectorAll('[id^="m-"]').forEach(m => { if(m !== el) m.classList.add('hidden'); }); el.classList.toggle('hidden'); }

        async function submitPost() {
            if (document.getElementById('inpCaptcha').value.toUpperCase() !== captchaAns) return alert("Captcha failed.");
            const h = window.location.hash; const isReply = h.startsWith('#thread/');
            const res = await api("", "POST", {
                type: isReply ? 'reply' : 'thread',
                threadId: isReply ? h.split('/')[1] : null,
                title: document.getElementById('inpTitle').value,
                content: document.getElementById('inpContent').value,
                image: document.getElementById('inpImageLink').value
            });
            if(res) { closeModal(); router(); }
        }

        async function router() {
            const h = window.location.hash;
            if (h.startsWith('#thread/')) { const t = await api(`?id=${h.split('/')[1]}`); if(t) renderThread(t); } 
            else { const threads = await api(); renderBoard(threads || []); }
        }

        window.onhashchange = router;
        router();
    </script>
</body>
</html>
