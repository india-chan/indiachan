<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiaChan | Anonymous Imageboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #05070a; color: #94a3b8; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(13, 17, 28, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .glass-hover:hover { background: rgba(255, 255, 255, 0.04); border-color: rgba(255, 153, 51, 0.3); transform: translateY(-3px); transition: all 0.3s; }
        .thread-number { position: absolute; top: -10px; left: 20px; background: linear-gradient(135deg, #ff9933, #d47a1d); color: white; font-size: 11px; font-weight: 900; padding: 4px 10px; border-radius: 6px; box-shadow: 0 4px 15px rgba(255, 153, 51, 0.5); z-index: 20; border: 1px solid rgba(255,255,255,0.3); }
        .post-img { max-width: 100%; border-radius: 12px; margin-top: 12px; border: 1px solid rgba(255,255,255,0.05); cursor: zoom-in; }
        .thumb-box { width: 85px; height: 85px; min-width: 85px; border-radius: 16px; overflow: hidden; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); }
        .thumb-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
        .accent-text { color: #ff9933; }
        .accent-bg { background: #ff9933; }
        input, textarea { background: rgba(15, 23, 42, 0.7) !important; border: 1px solid rgba(255,255,255,0.05) !important; color: white !important; }
    </style>
</head>
<body class="pb-32">
    <div id="ageWall" class="fixed inset-0 bg-[#05070a] z-[300] flex items-center justify-center p-6 text-center">
        <div class="max-w-sm w-full">
            <h1 class="text-6xl font-black text-white mb-2 italic uppercase tracking-tighter">India<span class="accent-text">Chan</span></h1>
            <p class="text-slate-500 mb-10 text-[10px] tracking-[0.3em] uppercase opacity-50 font-bold">18+ Only // Access Restricted</p>
            <button onclick="acceptAge()" class="accent-bg w-full py-5 rounded-2xl text-white font-black tracking-widest hover:scale-105 transition-all shadow-lg">ENTER</button>
        </div>
    </div>

    <div class="max-w-2xl mx-auto px-4">
        <header class="py-12 flex flex-col sm:flex-row justify-between items-center gap-6 text-center sm:text-left">
            <h1 onclick="window.location.hash = ''" class="text-5xl font-black text-white cursor-pointer italic uppercase tracking-tighter">India<span class="accent-text">Chan</span></h1>
            <button onclick="openModal()" class="bg-white text-black px-8 py-3 rounded-full font-black text-[10px] tracking-widest uppercase shadow-2xl hover:bg-orange-500 hover:text-white transition-all w-full sm:w-auto">New Thread</button>
        </header>
        <div id="view-container" class="space-y-6"></div>
    </div>

    <div id="postModal" class="hidden fixed inset-0 bg-black/90 z-[250] flex items-end sm:items-center justify-center backdrop-blur-md">
        <div class="glass w-full max-w-lg p-6 sm:p-10 rounded-t-[3rem] sm:rounded-[3rem] shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-8">
                <span id="modalTitle" class="text-[11px] font-black accent-text uppercase tracking-widest">New Transmission</span>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <input id="inpTitle" type="text" maxlength="100" placeholder="Subject" class="w-full p-5 rounded-2xl mb-4 text-sm font-bold">
            <textarea id="inpContent" maxlength="500" placeholder="Content..." class="w-full p-5 rounded-2xl mb-5 h-48 outline-none text-sm leading-relaxed whitespace-pre-wrap"></textarea>
            
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-slate-900/80 p-4 rounded-2xl border border-white/5 flex items-center justify-between">
                    <span id="captchaTxt" class="text-[10px] font-black text-slate-500 uppercase"></span>
                    <input id="inpCaptcha" type="number" class="w-14 bg-transparent text-center border-b-2 border-orange-500 outline-none font-black text-white">
                </div>
                <button onclick="document.getElementById('imgInput').click()" id="uploadBtn" class="bg-white/5 border border-white/10 rounded-2xl text-[10px] font-black uppercase text-slate-400">Add Image</button>
                <input type="file" id="imgInput" class="hidden" accept="image/*" onchange="uploadToWorker(this)">
            </div>
            <button id="submitBtn" onclick="submitPost()" class="accent-bg w-full py-5 rounded-[1.5rem] text-white font-black uppercase tracking-widest hover:brightness-110 transition-all">Transmit Message</button>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://anon-board.indiachan.workers.dev'; 
        const AUTH_KEY = 'my-secret-key-123';
        let captchaAns = 0;

        function acceptAge() { localStorage.setItem('v3_age', 't'); document.getElementById('ageWall').remove(); }
        if(localStorage.getItem('v3_age')) document.getElementById('ageWall').remove();

        function genCaptcha() {
            const a = Math.floor(Math.random() * 9) + 1; const b = Math.floor(Math.random() * 9) + 1;
            captchaAns = a + b; document.getElementById('captchaTxt').innerText = `${a} + ${b} =`;
            document.getElementById('inpCaptcha').value = '';
        }

        async function api(path = "", method = "GET", body = null, headers = {}) {
            const res = await fetch(`${WORKER_URL}${path}`, {
                method, headers: { 'X-Anon-Key': AUTH_KEY, 'Content-Type': 'application/json', ...headers },
                body: body ? JSON.stringify(body) : null
            });
            return res.ok ? await res.json() : null;
        }

        async function uploadToWorker(input) {
            const btn = document.getElementById('uploadBtn'); btn.innerText = "UPLOADING...";
            const file = input.files[0];
            const reader = new FileReader();
            reader.onloadend = async () => {
                const base64 = reader.result.split(',')[1];
                const res = await fetch(`${WORKER_URL}/upload-image`, {
                    method: "POST",
                    headers: { 'X-Anon-Key': AUTH_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64 })
                });
                const data = await res.json();
                if(data.success) { document.getElementById('inpContent').value += `\n${data.url}`; btn.innerText = "IMAGE ADDED"; }
                else { btn.innerText = "FAILED"; }
            };
            reader.readAsDataURL(file);
        }

        function getThumb(content) {
            const match = content.match(/(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/i);
            return match ? `<div class="thumb-box"><img src="${match[0]}" class="thumb-img"></div>` : `<div class="thumb-box flex items-center justify-center text-[10px] text-slate-700 font-black">TXT</div>`;
        }

        function renderBoard(threads) {
            document.getElementById('view-container').innerHTML = (threads || []).map((t, i) => `
                <div onclick="window.location.hash = '#thread/${t.id}'" class="relative glass glass-hover p-5 rounded-[2.5rem] flex gap-5 items-center cursor-pointer">
                    <div class="thread-number">#${i + 1}</div>
                    ${getThumb(t.replies[0].content)}
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center mb-1">
                            ${t.sticky ? '<span class="bg-orange-500 text-white px-2 py-0.5 rounded text-[8px] font-black mr-2">STICKY</span>' : ''}
                            <h2 class="text-sm font-black text-white uppercase truncate tracking-tight">${t.title}</h2>
                        </div>
                        <p class="text-slate-500 text-[11px] line-clamp-2 opacity-80">${t.replies[0].content}</p>
                        <div class="mt-3 text-[9px] font-black text-slate-600 tracking-widest uppercase">${t.replies.length} REPLIES</div>
                    </div>
                </div>
            `).join('');
        }

        function renderThread(t) {
            document.getElementById('view-container').innerHTML = `
                <button onclick="window.location.hash = ''" class="mb-8 text-[10px] font-black uppercase text-slate-500 hover:text-orange-500"><i class="fa-solid fa-chevron-left mr-2"></i> Return</button>
                <div class="space-y-6 pb-20">
                    ${t.replies.map((r, i) => `
                        <div class="relative glass p-7 rounded-[2.5rem] ${i > 0 ? 'ml-6 sm:ml-12' : 'border-orange-500/20 border'}">
                            <div class="flex items-center gap-3 mb-5"><div class="w-3 h-3 rounded-full" style="background:#${r.hash}"></div><span class="text-[10px] font-black text-slate-500 uppercase">Anon ID: ${r.hash}</span></div>
                            <div class="text-slate-200 text-[14px] leading-relaxed whitespace-pre-wrap">${r.content.replace(/(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/gi, '<img src="$1" class="post-img" onclick="window.open(\'$1\')">')}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="fixed bottom-10 left-4 right-4 max-w-2xl mx-auto"><button onclick="openModal()" class="accent-bg w-full py-5 rounded-[2rem] text-white font-black uppercase tracking-widest shadow-xl">Submit Reply</button></div>
            `;
            window.scrollTo(0, 0);
        }

        function openModal() {
            const isReply = window.location.hash.startsWith('#thread/');
            document.getElementById('modalTitle').innerText = isReply ? "Reply Transmission" : "New Transmission";
            document.getElementById('inpTitle').style.display = isReply ? 'none' : 'block';
            genCaptcha(); document.getElementById('postModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('postModal').classList.add('hidden'); }

        async function submitPost() {
            const content = document.getElementById('inpContent').value;
            if (content.length < 2 || parseInt(document.getElementById('inpCaptcha').value) !== captchaAns) return alert("Validation Failed");
            const hash = window.location.hash; const isReply = hash.startsWith('#thread/');
            const res = await api("", "POST", { type: isReply ? 'reply' : 'thread', threadId: isReply ? hash.split('/')[1] : null, title: document.getElementById('inpTitle').value || "Anonymous", content: content });
            if(res) { closeModal(); document.getElementById('inpContent').value = ''; document.getElementById('inpTitle').value = ''; router(); }
        }

        async function router() {
            const hash = window.location.hash;
            if (hash.startsWith('#thread/')) {
                const t = await api(`?id=${hash.split('/')[1]}`); if(t) renderThread(t);
            } else {
                const threads = await api(); renderBoard(threads);
            }
        }

        window.addEventListener('hashchange', router); router();
    </script>
</body>
</html>
