<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiaChan | Anonymous Imageboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #05070a; color: #94a3b8; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(13, 17, 28, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .glass-hover { transition: all 0.3s ease; }
        .glass-hover:hover { border-color: rgba(255, 153, 51, 0.3); transform: translateY(-2px); }
        .thread-number { position: absolute; top: -10px; left: 20px; background: #ff9933; color: white; font-size: 10px; font-weight: 900; padding: 2px 8px; border-radius: 4px; }
        .post-img { max-width: 100%; border-radius: 12px; margin-top: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .thumb-box { width: 80px; height: 80px; min-width: 80px; border-radius: 16px; overflow: hidden; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); }
        .thumb-img { width: 100%; height: 100%; object-fit: cover; }
        .accent-text { color: #ff9933; }
        .accent-bg { background: #ff9933; }
        input, textarea { background: rgba(15, 23, 42, 0.7) !important; border: 1px solid rgba(255,255,255,0.05) !important; color: white !important; }
    </style>
</head>
<body class="pb-32">

    <div id="ageWall" class="fixed inset-0 bg-[#05070a] z-[300] flex items-center justify-center p-6 text-center">
        <div class="max-w-sm w-full">
            <h1 class="text-6xl font-black text-white mb-2 italic uppercase">India<span class="accent-text">Chan</span></h1>
            <button onclick="acceptAge()" class="accent-bg w-full py-5 rounded-2xl text-white font-black tracking-widest mt-10">ENTER BOARD</button>
        </div>
    </div>

    <div class="max-w-2xl mx-auto px-4">
        <header class="py-12 flex justify-between items-center">
            <h1 onclick="window.location.hash = ''" class="text-4xl font-black text-white cursor-pointer italic uppercase">India<span class="accent-text">Chan</span></h1>
            <button onclick="openModal()" class="bg-white text-black px-6 py-2 rounded-full font-black text-[10px] uppercase">New Thread</button>
        </header>

        <div id="view-container" class="space-y-6"></div>
    </div>

    <div id="postModal" class="hidden fixed inset-0 bg-black/90 z-[250] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="glass w-full max-w-lg p-8 rounded-[2.5rem]">
            <input id="inpTitle" type="text" placeholder="Subject" class="w-full p-4 rounded-xl mb-4">
            <textarea id="inpContent" placeholder="Content..." class="w-full p-4 rounded-xl mb-4 h-40"></textarea>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-slate-900 p-3 rounded-xl flex items-center justify-between">
                    <span id="captchaTxt" class="text-[10px] font-bold text-slate-500"></span>
                    <input id="inpCaptcha" type="number" class="w-12 bg-transparent text-center border-b border-orange-500 outline-none text-white">
                </div>
                <button onclick="document.getElementById('imgInput').click()" id="uploadBtn" class="bg-white/5 border border-white/10 rounded-xl text-[10px] font-bold uppercase text-slate-400">Add Image</button>
                <input type="file" id="imgInput" class="hidden" accept="image/*" onchange="uploadToImgBB(this)">
            </div>
            <button onclick="submitPost()" class="accent-bg w-full py-4 rounded-xl text-white font-black uppercase">Transmit</button>
            <button onclick="closeModal()" class="w-full mt-4 text-slate-600 text-[10px] font-bold uppercase">Cancel</button>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://anon-board.indiachan.workers.dev'; // No trailing slash
        const AUTH_KEY = 'my-secret-key-123';
        const IMGBB_KEY = '6e999c06f4db58014ea5eaa09366eece';
        let captchaAns = 0;

        function acceptAge() { localStorage.setItem('v3_age', 't'); document.getElementById('ageWall').remove(); }
        if(localStorage.getItem('v3_age')) document.getElementById('ageWall').remove();

        function genCaptcha() {
            const a = Math.floor(Math.random() * 9) + 1; const b = Math.floor(Math.random() * 9) + 1;
            captchaAns = a + b; document.getElementById('captchaTxt').innerText = `${a} + ${b} =`;
        }

        async function api(path = "", method = "GET", body = null, headers = {}) {
            const res = await fetch(`${WORKER_URL}${path}`, {
                method,
                headers: { 'X-Anon-Key': AUTH_KEY, 'Content-Type': 'application/json', ...headers },
                body: body ? JSON.stringify(body) : null
            });
            return res.ok ? await res.json() : null;
        }

        async function uploadToImgBB(input) {
            const btn = document.getElementById('uploadBtn'); btn.innerText = "UPLOADING...";
            const fd = new FormData(); fd.append("image", input.files[0]);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: fd });
            const data = await res.json();
            if(data.success) { document.getElementById('inpContent').value += `\n${data.data.url}`; btn.innerText = "IMAGE READY"; }
        }

        function renderBoard(threads) {
            const container = document.getElementById('view-container');
            if(!threads || threads.length === 0) {
                container.innerHTML = `<div class="text-center py-20 opacity-30 font-black uppercase tracking-widest">No Transmissions Found</div>`;
                return;
            }
            container.innerHTML = threads.map((t, i) => {
                const img = t.replies[0].content.match(/(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/i);
                return `
                    <div onclick="window.location.hash = '#thread/${t.id}'" class="relative glass glass-hover p-5 rounded-[2rem] flex gap-5 items-center cursor-pointer">
                        <div class="thread-number">#${i+1}</div>
                        <div class="thumb-box">${img ? `<img src="${img[0]}" class="thumb-img">` : `<div class="h-full flex items-center justify-center text-[10px] font-bold text-slate-700">TEXT</div>`}</div>
                        <div class="flex-1 min-w-0">
                            <h2 class="text-sm font-black text-white uppercase truncate">${t.title || 'Anonymous'}</h2>
                            <p class="text-slate-500 text-[11px] line-clamp-1">${t.replies[0].content}</p>
                            <div class="mt-2 text-[9px] font-bold text-orange-500/50 uppercase">${t.replies.length} Replies</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderThread(t) {
            document.getElementById('view-container').innerHTML = `
                <button onclick="window.location.hash = ''" class="mb-6 text-[10px] font-bold text-slate-500 uppercase">← Back</button>
                <div class="space-y-4">
                    ${t.replies.map(r => `
                        <div class="glass p-6 rounded-[2rem]">
                            <div class="text-[9px] font-bold text-slate-600 mb-3 uppercase">Anon ID: ${r.hash}</div>
                            <div class="text-slate-300 text-sm whitespace-pre-wrap">${r.content.replace(/(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/gi, '<img src="$1" class="post-img">')}</div>
                        </div>
                    `).join('')}
                </div>
                <button onclick="openModal()" class="accent-bg w-full py-4 rounded-2xl mt-8 text-white font-bold uppercase">Reply</button>
            `;
            window.scrollTo(0, 0);
        }

        async function submitPost() {
            if (parseInt(document.getElementById('inpCaptcha').value) !== captchaAns) return alert("Captcha Failed");
            const hash = window.location.hash;
            const isReply = hash.startsWith('#thread/');
            const res = await api("/", "POST", {
                type: isReply ? 'reply' : 'thread',
                threadId: isReply ? hash.split('/')[1] : null,
                title: document.getElementById('inpTitle').value,
                content: document.getElementById('inpContent').value
            });
            if(res) { closeModal(); router(); }
        }

        function openModal() { genCaptcha(); document.getElementById('postModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('postModal').classList.add('hidden'); }

        async function router() {
            const hash = window.location.hash;
            if (hash.startsWith('#thread/')) {
                const t = await api(`?id=${hash.split('/')[1]}`);
                if(t) renderThread(t);
            } else {
                const threads = await api();
                renderBoard(threads);
            }
        }
        window.addEventListener('hashchange', router);
        router();
    </script>
</body>
</html>
