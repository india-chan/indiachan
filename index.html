<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiaChan | The Premier Indian Anonymous Imageboard</title>
    
    <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/a/AVvXsEi8vvXAjT4D0-_fynv8GhU6ipndl0T1UiwTJmYzYizupAzFbmmSvCfF8OZYwYBI1H63OUilYcHqwaSjXjGF1t90wmwBlyr1-rbZWvXwgOBBg5c9foCTXBwhjRzr82TsT7BPQo0Ii03NjHjOdnDkbDV6OT2IS8J0ixJDcf5ObQMntEIbCyH8Xt7sGkfh6u7F">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #05070a; color: #94a3b8; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(13, 17, 28, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); position: relative; }
        .glass-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-hover:hover { background: rgba(255, 255, 255, 0.04); border-color: rgba(255, 153, 51, 0.3); transform: translateY(-3px); }
        
        .thread-number { position: absolute; top: -10px; left: 20px; background: linear-gradient(135deg, #ff9933, #d47a1d); color: white; font-size: 11px; font-weight: 900; padding: 4px 10px; border-radius: 6px; box-shadow: 0 4px 15px rgba(255, 153, 51, 0.5); z-index: 10; border: 1px solid rgba(255,255,255,0.3); }
        
        .post-img { max-width: 200px; max-height: 200px; object-fit: contain; border-radius: 12px; margin-top: 12px; border: 1px solid rgba(255,255,255,0.05); cursor: zoom-in; display: block; transition: all 0.1s ease; }
        .post-img.expanded { max-width: 100%; max-height: none; cursor: zoom-out; }

        .thumb-box { width: 70px; height: 70px; min-width: 70px; border-radius: 12px; overflow: hidden; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); }
        @media (min-width: 640px) { .thumb-box { width: 85px; height: 85px; min-width: 85px; } }
        .thumb-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
        
        .admin-menu { z-index: 50 !important; box-shadow: 0 20px 50px rgba(0,0,0,0.9); background: rgba(13, 17, 28, 0.95) !important; }
        .accent-text { color: #ff9933; }
        .accent-bg { background: #ff9933; }
        .sticky-tag { background: #ff9933; color: white; padding: 2px 6px; border-radius: 4px; font-size: 8px; font-weight: 900; margin-right: 8px; }
        input, textarea { background: rgba(15, 23, 42, 0.7) !important; border: 1px solid rgba(255,255,255,0.05) !important; color: white !important; }
    </style>
</head>
<body class="pb-32">

    <div id="ageWall" class="fixed inset-0 bg-[#05070a] z-[300] flex items-center justify-center p-6 text-center">
        <div class="max-w-sm w-full">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg5CV9n0R91ThtxHPeBtG_FSKCyUi3Z3KbRnp0Yq0PM5BIA1WVcQO9jieJWdne6hBW_OxAbXX8syFXdw13OG7X447OWbyrvFlh8zXgLDGlzs5iJjisKSfIPg4VDt85UmmBHRUDjr8BdTAmt9K82RQFY-0ovvMNhyL2EeWFa0yfRmbIgatZDsUUHV1_hFm9j/s0/40701.png" class="mx-auto mb-6 max-h-20 w-auto">
            <button onclick="acceptAge()" class="accent-bg w-full py-5 rounded-2xl text-white font-black tracking-widest hover:scale-105 transition-all shadow-lg">ENTER 18+</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-4">
        <div class="flex justify-center pt-8">
            <img id="topBanner" src="" class="max-w-full h-auto rounded-lg border border-white/10" style="display:none;">
        </div>

        <header class="py-12 flex flex-col sm:flex-row justify-between items-center gap-6">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg5CV9n0R91ThtxHPeBtG_FSKCyUi3Z3KbRnp0Yq0PM5BIA1WVcQO9jieJWdne6hBW_OxAbXX8syFXdw13OG7X447OWbyrvFlh8zXgLDGlzs5iJjisKSfIPg4VDt85UmmBHRUDjr8BdTAmt9K82RQFY-0ovvMNhyL2EeWFa0yfRmbIgatZDsUUHV1_hFm9j/s0/40701.png" onclick="window.location.hash = ''" class="h-12 w-auto cursor-pointer">
            <button onclick="openModal()" class="bg-white text-black px-8 py-3 rounded-full font-black text-[10px] tracking-widest uppercase hover:bg-orange-500 hover:text-white transition-all w-full sm:w-auto">New Thread</button>
        </header>

        <div id="view-container"></div>

        <footer id="mainFooter" class="mt-20 py-10 border-t border-white/5 text-center">
            <p class="text-[11px] text-slate-500 max-w-md mx-auto mb-6">IndiaChan is a law-abiding platform. All posts are user-generated.</p>
            <div class="glass p-4 rounded-2xl inline-block border border-white/5">
                <a href="mailto:JefferyEpsteinMossad@proton.me" class="text-[10px] font-black text-white">JefferyEpsteinMossad@proton.me</a>
            </div>
        </footer>
    </div>

    <div id="postModal" class="hidden fixed inset-0 bg-black/90 z-[250] flex items-end sm:items-center justify-center backdrop-blur-md">
        <div class="glass w-full max-w-lg p-6 sm:p-10 rounded-t-[3rem] sm:rounded-[3rem] shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-8">
                <span id="modalTitle" class="text-[11px] font-black accent-text uppercase tracking-widest">New Transmission</span>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 text-slate-400"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <input id="inpTitle" type="text" maxlength="100" placeholder="Subject" class="w-full p-4 rounded-xl mb-4 text-sm font-bold">
            <textarea id="inpContent" maxlength="2000" placeholder="Content..." class="w-full p-4 rounded-xl mb-5 h-40 text-sm"></textarea>
            <input id="inpImageLink" type="url" placeholder="Image URL (Optional)" class="w-full p-4 rounded-xl mb-6 text-xs">
            
            <div class="flex justify-center mb-8">
                <div class="cf-turnstile" data-sitekey="0x4AAAAAAC_dH6OyYpRpy3_n" data-callback="onCaptchaSuccess"></div>
            </div>

            <button id="submitBtn" onclick="submitPost()" class="accent-bg w-full py-5 rounded-[1.5rem] text-white font-black uppercase opacity-50 cursor-not-allowed" disabled>Transmit</button>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://indiachan.indiachan.workers.dev/'; 
        let isVerified = false;

        function onCaptchaSuccess() {
            isVerified = true;
            const btn = document.getElementById('submitBtn');
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
        }

        function acceptAge() { localStorage.setItem('v3_age', 't'); document.getElementById('ageWall').remove(); }
        if(localStorage.getItem('v3_age')) document.getElementById('ageWall').remove();

        async function api(path = "", method = "GET", body = null, headers = {}) {
            const url = path.includes('?') ? `${WORKER_URL}${path}&t=${Date.now()}` : `${WORKER_URL}${path}?t=${Date.now()}`;
            const options = { method, headers: { ...headers } };
            if (body) { options.headers['Content-Type'] = 'application/json'; options.body = JSON.stringify(body); }
            const res = await fetch(url, options);
            return res.ok ? await res.json() : null;
        }

        function renderBoard(threads, filterArchive = false) {
            const container = document.getElementById('view-container');
            container.className = "grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6";
            document.getElementById('mainFooter').style.display = 'block';
            
            const filtered = threads.filter(t => filterArchive ? t.locked : !t.locked);
            
            container.innerHTML = filtered.map((t, i) => `
                <div onclick="window.location.hash = '#thread/${t.id}'" class="relative glass glass-hover p-4 sm:p-5 rounded-[2rem] flex gap-4 items-center cursor-pointer overflow-visible">
                    <div class="thread-number">#${i + 1}</div>
                    <div class="thumb-box shrink-0">
                        <img src="${(t.replies && t.replies[0]?.image) || 'https://placehold.co/85x85?text=NO+IMG'}" class="thumb-img">
                    </div>
                    <div class="flex-1 min-w-0 pr-6">
                        <div class="flex items-center gap-2 mb-1">
                            ${t.sticky ? '<span class="sticky-tag">PIN</span>' : ''}
                            <h2 class="text-[13px] font-black text-white uppercase truncate whitespace-nowrap overflow-hidden">${t.title || 'Anonymous'}</h2>
                        </div>
                        <p class="text-slate-500 text-[11px] line-clamp-2 opacity-70">${t.replies?.[0]?.content || ''}</p>
                    </div>
                    
                    <button onclick="event.stopPropagation(); toggleMenu('${t.id}')" class="absolute right-4 p-2 text-slate-700 hover:text-white z-20">
                        <i class="fa-solid fa-ellipsis-vertical"></i>
                    </button>

                    <div id="m-${t.id}" class="admin-menu hidden absolute right-2 top-12 w-36 glass rounded-xl border border-white/10 overflow-hidden shadow-2xl">
                        <button onclick="event.stopPropagation(); handleAction('report', '${t.id}')" class="w-full p-3 text-left text-[9px] font-black uppercase hover:bg-white/10 border-b border-white/5">Report</button>
                        <button onclick="event.stopPropagation(); handleAction('sticky', '${t.id}')" class="w-full p-3 text-left text-[9px] font-black uppercase hover:bg-white/10 border-b border-white/5">Sticky</button>
                        <button onclick="event.stopPropagation(); handleAction('lock', '${t.id}')" class="w-full p-3 text-left text-[9px] font-black uppercase hover:bg-white/10 border-b border-white/5">Lock</button>
                        <button onclick="event.stopPropagation(); handleAction('delete', '${t.id}')" class="w-full p-3 text-left text-[9px] font-black uppercase text-red-400 hover:bg-red-500/10">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        async function handleAction(type, tId, rId = null) {
            if (type === 'report') {
                await api(`?id=${tId}${rId ? '&replyId='+rId : ''}`, "PATCH", { action: 'report' });
                alert("Reported.");
                return;
            }
            const pass = prompt("Admin Pass:"); if(!pass) return;
            const headers = { 'X-Admin-Pass': pass };
            let res;
            if (type === 'sticky') res = await api(`?id=${tId}`, "PATCH", { action: 'sticky' }, headers);
            else if (type === 'lock') res = await api(`?id=${tId}`, "PATCH", { action: 'lock' }, headers);
            else res = await api(`?id=${tId}${rId ? '&replyId='+rId : ''}`, "DELETE", null, headers);
            if(res) router();
        }

        function toggleMenu(id) {
            const el = document.getElementById(`m-${id}`);
            document.querySelectorAll('[id^="m-"]').forEach(m => { if(m !== el) m.classList.add('hidden'); });
            el.classList.toggle('hidden');
        }

        function openModal() { document.getElementById('postModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('postModal').classList.add('hidden'); }

        async function submitPost() {
            if (!isVerified) return;
            const h = window.location.hash; 
            const isReply = h.startsWith('#thread/');
            const res = await api("", "POST", {
                type: isReply ? 'reply' : 'thread',
                threadId: isReply ? h.split('/')[1] : null,
                title: document.getElementById('inpTitle').value || "Anonymous",
                content: document.getElementById('inpContent').value,
                image: document.getElementById('inpImageLink').value
            });
            if(res) { location.reload(); }
        }

        async function router() {
            const h = window.location.hash;
            if (h.startsWith('#thread/')) {
                const t = await api(`?id=${h.split('/')[1]}`);
                if(t) {
                    const container = document.getElementById('view-container');
                    container.className = "max-w-2xl mx-auto space-y-4";
                    container.innerHTML = `<button onclick="window.location.hash=''" class="text-[10px] font-black text-slate-500 uppercase mb-4">Back</button>` + 
                    t.replies.map(r => `
                        <div class="glass p-6 rounded-[2rem] relative">
                            <div class="flex justify-between mb-4">
                                <span class="text-[10px] font-bold text-slate-500">ID: ${r.userId}</span>
                                <button onclick="toggleMenu('${r.id}')" class="text-slate-700"><i class="fa-solid fa-ellipsis"></i></button>
                                <div id="m-${r.id}" class="admin-menu hidden absolute right-4 top-10 w-32 glass rounded-xl overflow-hidden border border-white/10">
                                    <button onclick="handleAction('delete', '${t.id}', '${r.id}')" class="w-full p-3 text-left text-[9px] font-black text-red-400">Delete</button>
                                </div>
                            </div>
                            <div class="text-sm text-slate-200">${r.content}</div>
                            ${r.image ? `<img src="${r.image}" class="post-img" onclick="this.classList.toggle('expanded')">` : ''}
                        </div>
                    `).join('');
                }
            } else {
                const threads = await api();
                renderBoard(threads || [], h === '#archive');
            }
        }

        window.onhashchange = router;
        
        const bannerImgs = [
            "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhJXoVN6ABWKt4gMrm4eay9-_ivwv43h8YggYhTet6eR8uDMZg-W38zsbwCTNS7apRVB-BXd8ayC1n7oFi7xavb0vSNEHPLEbd2daTSKoAnYiO0RRDQVTsLIdzWwTR3Twk3Z13diw-5N4Zyl_ZgmD7_ur7k8uEWTYDEsf-_SgWS251vuXNHh93T0X_PNXgM/s0/40702.png",
            "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiq8iBOzFptKekj2zgN5_WFKemUaCJhC2RMcaxXB03OoJInVbkxuqrzgYLlbFTvy0vB-nJYdIz-qkq-TqEpqoHKg2GOm8xp9M38F1RwvOfMFW9mrTkrHo_i2fHCAVESlcBFYq4_qRoVmqFkwqWr9KmNDXYlqF5u11GGtUEmxeCASfvs6ZXwHhGk_cIJPtjr/s0/40699.png",
            "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgXCOtczpXgpFJBNTJPN6AUSIZPlrTlXPZdMRRP87oDTHA4rgSZBGINiS05rj7qOpMQN6LJSZ8BhuisUefNKY0a5IoZS7uBJ_bkbd-YarYdig_26S3SMuTRzlfw1HMFpoIYjTAlt-cghfP5s9fTjyIBsiPME9_nuVcehLeaCdytOmmSIciF9n4KxXbcmxUQ/s0/40697.png",
            "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhzIjRLJoL04m2jI97E3TRQgxZ8muF39OJDVt4Z9IkGN5lu72zOhrXDu-glheHJluKugW0nWE3BcDSCe5bTruLaS_kBNFdsO3Tll2CZwy7yNNt9g9XdDiGeWHdDDv0sElBG4XFUMTuUzSyWlas-VNZWWAx_NYAbMTOiSZ9jW5UR7mspnxxlGQCWLal0y2X2/s0/40696.gif",
            "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgBQzTfkmOiD9EXTsaokfM_DjAF73x_ep4MFautqtKXijgXzPyQAqPxsTfsEqqR0hXcN9I-YOxAd_-s3kwqfxb8NyfHtEJyNJUs8D5J1a2xazSbSQ-sFv4jPC3EfJLIxuzlAqepA1I1EhcWhcu1-BYzirtMJwF_DHBvNte2peG57DdZK04xICh_AwpILeCP/s0/40692.png"
        ];
        const topB = document.getElementById('topBanner');
        topB.src = bannerImgs[Math.floor(Math.random() * bannerImgs.length)];
        topB.style.display = 'block';
        router();
    </script>
</body>
</html>
